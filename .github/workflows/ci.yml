name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --all
      - name: sample artifact snapshots
        run: bash scripts/check-sample-artifacts.sh

  formal-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install TLC wrapper
        run: |
          TLC_DIR=$(bash scripts/install-tlc.sh)
          echo "$TLC_DIR" >> "$GITHUB_PATH"
          # GITHUB_PATH applies to subsequent steps; export for this step too.
          export PATH="$TLC_DIR:$PATH"
          # TLC exits non-zero for -help; smoke-check the wrapper is runnable.
          help_out=$(tlc -help 2>&1 || true)
          echo "$help_out" | head -n 5
          echo "$help_out" | grep -qiE 'tlc|NAME|Usage|options'
      - name: Build CLI
        run: cargo build -p rdra-ish-cli --release
      - name: Export + verify pass samples
        run: |
          BIN=./target/release/rdra-ish
          for sample in \
            samples/formal-verification/order.rdra \
            samples/formal-verification/int_stock.rdra
          do
            echo "==> check/export/verify $sample"
            "$BIN" check "$sample"
            "$BIN" export "$sample" --kind tla -o /tmp/rdra-ci-tla
            set +e
            out=$("$BIN" verify "$sample" --backend tlc -o /tmp/rdra-ci-tla 2>&1)
            status=$?
            set -e
            echo "$out"
            if [[ $status -ne 0 ]]; then
              echo "expected TLC pass for $sample" >&2
              exit 1
            fi
            if ! grep -q "tlc_result: ok" <<<"$out"; then
              echo "expected tlc_result: ok for $sample" >&2
              exit 1
            fi
          done
      - name: Verify fail samples report TLC counterexample
        run: |
          BIN=./target/release/rdra-ish
          for sample in \
            samples/formal-verification/cross_order_payment.rdra \
            samples/formal-verification/quantifier_none.rdra \
            samples/formal-verification/now_coupon.rdra
          do
            echo "==> expect TLC counterexample: $sample"
            set +e
            out=$("$BIN" verify "$sample" --backend tlc -o /tmp/rdra-ci-tla-fail 2>&1)
            status=$?
            set -e
            echo "$out"
            if [[ $status -eq 0 ]]; then
              echo "expected TLC failure for $sample" >&2
              exit 1
            fi
            if ! grep -q "tlc_result: counterexample" <<<"$out"; then
              echo "expected tlc_result: counterexample for $sample (not tool_error); got:" >&2
              echo "$out" >&2
              exit 1
            fi
            if ! grep -qiE "invariant.*violated|property.*violated|Error:.*violated" <<<"$out"; then
              echo "expected TLC-native violation fingerprint for $sample" >&2
              exit 1
            fi
          done
