name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: rdra-ish

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          fi

          staging="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${staging}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/${staging}/"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${staging}/"
          fi

          cp README.md "dist/${staging}/"
          find . -maxdepth 1 -name "LICENSE*" -exec cp {} "dist/${staging}/" \;

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && 7z a "${staging}.zip" "${staging}")
            echo "asset=dist/${staging}.zip" >> "$GITHUB_ENV"
          else
            tar -C dist -czf "dist/${staging}.tar.gz" "${staging}"
            echo "asset=dist/${staging}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: ${{ env.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
